name: my_hobby
description: "Business Diary - A global business directory with real-time promos and admin controls."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_bloc: ^8.1.3
  provider: ^6.1.1
  
  # Backend & Auth
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.2
  cloud_firestore: ^5.0.2
  firebase_storage: ^12.0.1
  firebase_messaging: ^15.0.2
  
  # Utils
  uuid: ^4.2.2
  url_launcher: ^6.2.2
  intl: ^0.20.2
  equatable: ^2.0.5
  intl_phone_field: ^3.2.0
  csc_picker_plus: ^0.0.3
  cached_network_image: ^3.3.0
  google_fonts: ^6.1.0
  geolocator: ^10.1.0
  image_picker: ^1.0.7
  image_cropper: ^12.2.1
  flutter_image_compress: ^2.1.0
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
