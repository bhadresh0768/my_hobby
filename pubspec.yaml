name: my_hobby
description: "Business Diary - A global business directory with real-time promos and admin controls."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_bloc: ^8.1.3
  provider: ^6.1.1
  
  # Backend & Auth
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6
  firebase_messaging: ^14.7.9
  
  # Utils
  uuid: ^4.2.2
  url_launcher: ^6.2.2
  intl: ^0.20.2
  equatable: ^2.0.5
  intl_phone_field: ^3.2.0
  cached_network_image: ^3.3.0
  google_fonts: ^6.1.0
  geolocator: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
