name: my_hobby
description: "Business Diary - A global business directory with real-time promos and admin controls."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_bloc: ^9.1.1
  provider: ^6.1.1
  
  # Backend & Auth
  firebase_core: ^4.12.1
  firebase_auth: ^6.5.6
  cloud_firestore: ^6.7.1
  firebase_storage: ^13.4.5
  firebase_messaging: ^16.4.3
  
  # Utils
  uuid: ^4.2.2
  url_launcher: ^6.2.2
  intl: ^0.20.2
  equatable: ^2.0.5
  intl_phone_field: ^3.2.0
  csc_picker_plus: ^0.0.3
  map_location_picker: ^3.1.0
  cached_network_image: ^3.3.0
  google_fonts: ^8.1.0
  geolocator: ^14.0.3
  dart_geohash: ^2.1.0
  geocoding: ^3.0.0
  share_plus: ^13.2.1
  image_picker: ^1.0.7
  image_cropper: ^12.2.1
  flutter_image_compress: ^2.1.0
  path_provider: ^2.1.1
  retrofit: ^4.9.2
  dio: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

dependency_overrides:
  google_maps_apis: ^5.1.0
